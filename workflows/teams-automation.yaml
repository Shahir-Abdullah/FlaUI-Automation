name: "Send FlaUI message to Shahir Abdullah"
description: |
  E2E workflow mapped to the recorded Microsoft Teams UIA trace:
    1. Launches Teams if it is not already running.
    2. Opens the Shahir Abdullah chat.
    3. Types the requested message into the compose box.
    4. Clicks the Send control.

target:
  process: ms-teams
  windowTitle: "Chat | Shahir Abdullah (You) | Microsoft Teams"
  startIfNotRunning:
    path: "C:\\Users\\ShahirAbdullah\\AppData\\Local\\Microsoft\\WindowsApps\\ms-teams.exe"
    waitForReady: 10s

defaults:
  timeout: 8s
  retry: 2
  pauseBetweenSteps: 300ms

steps:
  - id: select-shahir-chat
    action: click
    target:
      name: "Chat Shahir Abdullah (You)"
      controlType: "TreeItem"

  - id: type-greeting-text
    action: keys
    target:
      name: "Type a message"
      controlType: "Edit"
    value: "Hello Shahir From FLAui"

  - id: click-send-message
    action: click
    target:
      name: "Send (Ctrl+Enter)"
      controlType: "Button"
